<!DOCTYPE html>
<html>
<head>
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="calculator">
        <h2>Scientific Calculator</h2>

        <input type="text" id="display" readonly>

        <div class="buttons">
            <button class="red" onclick="clearDisplay()">C</button>
            <button class="red" onclick="del()">DEL</button>
            <button onclick="append('(')">(</button>
            <button onclick="append(')')">)</button>
            <button class="orange" onclick="append('/')">÷</button>

            <button onclick="sin()">sin</button>
            <button onclick="cos()">cos</button>
            <button onclick="tan()">tan</button>
            <button onclick="append(Math.PI)">π</button>
            <button class="orange" onclick="append('*')">×</button>

            <button onclick="log()">log</button>
            <button onclick="ln()">ln</button>
            <button onclick="sqrt()">√</button>
            <button onclick="append(Math.E)">e</button>
            <button class="orange" onclick="append('-')">-</button>

            <button onclick="power()">x²</button>
            <button onclick="powerY()">x^</button>
            <button onclick="inverse()">1/x</button>
            <button onclick="percent()">%</button>
            <button class="orange" onclick="append('+')">+</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('/')">÷</button>

            <button class="equal" onclick="calculate()">=</button>
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
        </div>

        <a href="converter.html" class="link">Go to Converter →</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
